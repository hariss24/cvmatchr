<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Historique — CV Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}">
<script>var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Historique</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="btn-import" type="button" class="ghost" title="Importer un fichier d'export">⬆ Importer</button>
      <button id="btn-export" type="button" class="ghost" title="Exporter toutes les données">⬇ Exporter</button>
      <input id="file-import" type="file" accept=".json" style="display:none">
      <div id="btn-theme" role="button" tabindex="0" title="Basculer thème clair/sombre">
        <span class="toggle-icon toggle-sun">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </span>
        <span class="toggle-knob"></span>
        <span class="toggle-icon toggle-moon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
      </div>
      <a href="/">&lsaquo; Retour</a>
    </div>
  </div>
  <input type="text" id="search" placeholder="Rechercher entreprise, poste, notes..." />
  <div id="root"></div>
</div>
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
<script>
(function(){
  var html = document.documentElement;
  var btn = document.getElementById('btn-theme');
  var saved = localStorage.getItem('theme') || 'light';
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
  }
  applyTheme(saved);
  btn.addEventListener('click', function(){
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
})();
</script>
</body>
</html>
